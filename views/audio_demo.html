<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversational AI Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .chat-container {
      border: 1px solid #ddd;
      border-radius: 8px;
      margin: 20px 0;
      height: 400px;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 70%;
    }

    .user-message {
      background-color: #e3f2fd;
      margin-left: auto;
    }

    .bot-message {
      background-color: #f5f5f5;
      margin-right: auto;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 20px 0;
    }

    #recordButton {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .recording {
      background-color: #ff4444;
      color: white;
    }

    .not-recording {
      background-color: #4CAF50;
      color: white;
    }

    #audioPlayer {
      width: 100%;
      margin: 10px 0;
    }

    .status-indicator {
      font-size: 0.9em;
      color: #666;
      margin-left: 10px;
    }

    .recording-pulse {
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: #ff4444;
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 1s infinite;
    }
    .audio-queue-status {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>Conversational AI Chat</h1>
  <div class="chat-container" id="chatContainer"></div>
  
  <div class="controls">
      <button id="recordButton" class="not-recording" onclick="toggleRecording()">
          Start Recording
      </button>
      <span id="statusIndicator" class="status-indicator"></span>
  </div>
  
  <div class="audio-queue-status" id="audioQueueStatus"></div>

<script>
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let audioQueue = [];
        let isPlaying = false;
        let currentAudio = null;

        const recordButton = document.getElementById("recordButton");
        const statusIndicator = document.getElementById("statusIndicator");
        const chatContainer = document.getElementById("chatContainer");
        const audioQueueStatus = document.getElementById("audioQueueStatus");
        const setupWebSocket = () => {
            const ws = new WebSocket('wss:tm.demo.centrox.ai:8443/tm-audio/ws');
            
            ws.onopen = () => {
                console.log('WebSocket connection established');
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket Error:', error);
            };
            
            ws.onclose = (event) => {
                console.log('WebSocket connection closed:', event.code, event.reason);
                // Optional: Implement reconnection logic
                setTimeout(() => {
                    console.log('Attempting to reconnect...');
                    setupWebSocket();
                }, 3000);
            };
            
            ws.onmessage = (event) => {
                try {
                    const response = JSON.parse(event.data);
                    // Handle your response data here
                    if (response.type === 'audio') {
                        // Process audio response
                        console.log('Received audio data:', response.text);
                    }
                } catch (error) {
                    console.error('Error processing message:', error);
                }
            };
            
            return ws;
        };

        // Initialize WebSocket connection
        let ws = setupWebSocket();
        // Audio Queue Management
        function updateQueueStatus() {
            audioQueueStatus.textContent = `Audio queue: ${audioQueue.length} message(s) remaining`;
        }

        function playNextInQueue() {
            if (audioQueue.length === 0 || isPlaying) return;

            isPlaying = true;
            const nextAudio = audioQueue.shift();
            currentAudio = new Audio(`data:audio/mp3;base64,${nextAudio.audio}`);
            
            addMessage(nextAudio.text, false);
            updateQueueStatus();

            currentAudio.onended = () => {
                isPlaying = false;
                currentAudio = null;
                setTimeout(() => {
                    playNextInQueue();
                }, 1000); // 1-second gap between audio playback
            };

            currentAudio.play().catch(error => {
                console.error("Error playing audio:", error);
                isPlaying = false;
                playNextInQueue();
            });
        }

        // WebSocket message handling
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "audio") {
                audioQueue.push(data);
                updateQueueStatus();
                playNextInQueue();
            }
        };

        function addMessage(text, isUser) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Recording functions
        async function initializeMicrophone() {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (error) {
                console.error("Error accessing microphone:", error);
                updateStatus('error');
            }
        }

        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function updateStatus(status) {
            if (status === 'recording') {
                statusIndicator.innerHTML = '<span class="recording-pulse"></span>Recording...';
                recordButton.textContent = 'Stop Recording';
                recordButton.className = 'recording';
            } else {
                statusIndicator.textContent = '';
                recordButton.textContent = 'Start Recording';
                recordButton.className = 'not-recording';
            }
        }

        function startRecording() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                mediaRecorder.start();
                isRecording = true;
                updateStatus('recording');
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
            });
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            updateStatus('stopped');

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
                addMessage("Recording sent", true);

                const arrayBuffer = await audioBlob.arrayBuffer();
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                const offlineContext = new OfflineAudioContext(1, audioBuffer.length, 16000);
                const source = offlineContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(offlineContext.destination);
                source.start(0);
                
                const renderedBuffer = await offlineContext.startRendering();
                const wavBlob = bufferToWave(renderedBuffer, renderedBuffer.length);
                
                const reader = new FileReader();
                reader.onload = () => {
                    ws.send(reader.result);
                    audioChunks = [];
                };
                
                reader.readAsArrayBuffer(wavBlob);
            };
        }


// Function to convert AudioBuffer to WAV Blob
function bufferToWave(abuffer, len) {
   const numOfChannels = abuffer.numberOfChannels; 
   const length = len * numOfChannels * 2 + 44; // Header size
   const buffer = new ArrayBuffer(length); 
   const view = new DataView(buffer);

   // Write WAV header
   let offset = 0;

   function setString(str) { 
     for (let i=0; i<str.length; i++) { 
         view.setUint8(offset + i, str.charCodeAt(i)); 
     } 
     offset += str.length; 
   }

   setString('RIFF'); // Chunk ID
   view.setUint32(4, length - 8, true); // Chunk Size
   setString('WAVE'); // Format

   setString('fmt '); // Subchunk1 ID
   view.setUint32(16, 16, true); // Subchunk1 Size
   view.setUint16(20, 1, true); // Audio Format (PCM)
   view.setUint16(22, numOfChannels, true); // Number of Channels
   view.setUint32(24, 16000, true); // Sample Rate
   view.setUint32(28, 16000 * numOfChannels * 2, true); // Byte Rate
   view.setUint16(32, numOfChannels * 2, true); // Block Align
   view.setUint16(34, 16, true); // Bits per sample

   setString('data'); // Subchunk2 ID
   view.setUint32(36, length - offset - 8, true); // Subchunk2 Size

   // Write PCM samples
   for (let i=0; i<len; i++) { 
     for (let channel=0; channel<numOfChannels; channel++) { 
         const sample = abuffer.getChannelData(channel)[i]; 
         view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true); 
         offset += 2; 
     } 
   }
   
   return new Blob([view], { type:'audio/wav' }); 
}

</script>
</body>
</html>

/* Wavy Outer Border Effect */

    <script>

// Add TTS Selection Logic
let currentTTS = 'openai'; // Default selection
const ttsSelector = document.getElementById('ttsSelector');
const ttsDropdown = ttsSelector.nextElementSibling;
const ttsOptions = document.querySelectorAll('.tts-option');

// Initialize default TTS selection
function initializeTTSSelection() {
    ttsOptions.forEach(option => {
        if (option.dataset.tts === currentTTS) {
            option.classList.add('bg-blue-500/20');
            // Update the selector button text to show current selection
            const selectorText = ttsSelector.querySelector('.selected-option');
            selectorText.textContent = option.textContent;
        }
    });
}

ttsOptions.forEach(option => {
    option.addEventListener('click', () => {
        currentTTS = option.dataset.tts;
        ttsOptions.forEach(btn => btn.classList.remove('bg-blue-500/20'));
        option.classList.add('bg-blue-500/20');
        // Update the selector button text
        const selectorText = ttsSelector.querySelector('.selected-option');
        selectorText.textContent = option.textContent;
        closeDropdown(ttsDropdown);
    });
});

// Add Model Selection Logic
let currentModel = 'openai'; // Default selection
const modelSelector = document.getElementById('modelSelector');
const modelDropdown = modelSelector.nextElementSibling;
const modelOptions = document.querySelectorAll('.model-option');

// Initialize default Model selection
function initializeModelSelection() {
    modelOptions.forEach(option => {
        if (option.dataset.model === currentModel) {
            option.classList.add('bg-blue-500/20');
            // Update the selector button text to show current selection
            const selectorText = modelSelector.querySelector('.selected-option');
            selectorText.textContent = option.textContent;
        }
    });
}

modelOptions.forEach(option => {
    option.addEventListener('click', () => {
        currentModel = option.dataset.model;
        modelOptions.forEach(btn => btn.classList.remove('bg-blue-500/20'));
        option.classList.add('bg-blue-500/20');
        // Update the selector button text
        const selectorText = modelSelector.querySelector('.selected-option');
        selectorText.textContent = option.textContent;
        closeDropdown(modelDropdown);
    });
});

// Dropdown management
let activeDropdown = null;

function toggleDropdown(dropdown) {
    if (activeDropdown === dropdown) {
        closeDropdown(dropdown);
        activeDropdown = null;
    } else {
        if (activeDropdown) {
            closeDropdown(activeDropdown);
        }
        openDropdown(dropdown);
        activeDropdown = dropdown;
    }
}

function openDropdown(dropdown) {
    dropdown.classList.remove('scale-95', 'opacity-0', 'pointer-events-none');
    dropdown.classList.add('scale-100', 'opacity-100', 'pointer-events-auto');
}

function closeDropdown(dropdown) {
    dropdown.classList.remove('scale-100', 'opacity-100', 'pointer-events-auto');
    dropdown.classList.add('scale-95', 'opacity-0', 'pointer-events-none');
}

// Click handlers for both selectors
[modelSelector, ttsSelector].forEach(button => {
    button.addEventListener('click', (e) => {
        e.stopPropagation();
        const dropdown = button.nextElementSibling;
        toggleDropdown(dropdown);
    });
});

// Close dropdowns when clicking outside
document.addEventListener('click', () => {
    if (activeDropdown) {
        closeDropdown(activeDropdown);
        activeDropdown = null;
    }
});

// Prevent dropdown from closing when clicking inside
[modelDropdown, ttsDropdown].forEach(dropdown => {
    dropdown.addEventListener('click', (e) => {
        e.stopPropagation();
    });
});

// Initialize default selections when the page loads
document.addEventListener('DOMContentLoaded', () => {
    initializeTTSSelection();
    initializeModelSelection();
});        // Chat History Management
        let chatHistory =  [];
        let isChatHistoryVisible = false;

        const chatHistoryButton = document.getElementById('chatHistoryButton');
        const chatHistoryPanel = document.getElementById('chatHistoryPanel');
        const chatHistoryContent = document.getElementById('chatHistoryContent');

        // Toggle Chat History Panel
        function toggleChatHistory() {
            isChatHistoryVisible = !isChatHistoryVisible;
            if (isChatHistoryVisible) {
                chatHistoryPanel.classList.remove('hidden', 'scale-95');
                chatHistoryPanel.classList.add('block', 'scale-100');
                renderChatHistory();
            } else {
                chatHistoryPanel.classList.remove('block', 'scale-100');
                chatHistoryPanel.classList.add('hidden', 'scale-95');
            }
        }

        // Add Message to History
        function addToHistory(content, isUser = true) {
            const lastMessage = chatHistory[chatHistory.length - 1];
            
            if (!isUser && lastMessage && !lastMessage.isUser) {
                // Append to existing bot message
                lastMessage.text += ' ' + content;
                lastMessage.timestamp = new Date().toLocaleTimeString();
            } else {
                // Add new message
                chatHistory.push({
                    text: content,
                    isUser,
                    timestamp: new Date().toLocaleTimeString()
                });
            }
            
            if (isChatHistoryVisible) renderChatHistory();
        }
        document.getElementById('closeChatPanel').addEventListener('click', toggleChatHistory);
        chatHistoryButton.addEventListener('click', toggleChatHistory);
        function renderChatHistory() {
            chatHistoryContent.innerHTML = chatHistory.map(msg => `
                <div class="${msg.isUser ? 'flex justify-end' : 'flex justify-start'} animate-fade-in-up">
                    <div class="inline-block p-2 md:p-3 rounded-lg ${
                        msg.isUser
                        ? 'bg-gradient-to-br from-[#20378b] to-[#182158] text-white mr-2' 
                        : 'bg-[#182158]/40 text-white ml-2'
                    } max-w-[90%] md:max-w-[75%] shadow-md transition-transform duration-200 hover:scale-[1.02]">
                        <p class="text-sm md:text-base mb-1 break-words">${msg.text}</p>
                        <span class="text-xs md:text-sm opacity-75">${msg.timestamp}</span>
                    </div>
                </div>
            `).join('');
            chatHistoryContent.scrollTop = chatHistoryContent.scrollHeight;
        }

        // Audio and WebSocket Logic
        const WIDTH = 1000;
        const HEIGHT = 400;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext("2d");
        const logElement = document.getElementById('logs');
        const startButton = document.getElementById('startButton');
        let audioCtx;
        let isRecognitionStopped = true;
        let analyser;
        let freqs;
        let isRecording = false;
        let audioQueue = [];
        let isPlaying = false;
        let currentSourceNode = null;
        let ws;
        let recognition;
        let transcript = '';


        let isProcessing = false;
        let recordingTimeout = null;
        let lastTranscript = '';
        let currentTranscript = '';
        let finalTranscript = '';
        let recognitionComplete = false;

        // Visualization options
        const opts = {
            smoothing: 0.6,
            fft: 8,
            minDecibels: -70,
            scale: 0.2,
            glow: 10,
            color1: [203, 36, 128],
            color2: [41, 200, 192],
            color3: [24, 137, 218],
            fillOpacity: 0.6,
            lineWidth: 1,
            blend: "screen",
            shift: 50,
            width: 60,
            amp: 1
        };

        // Setup push-to-talk events
        startButton.addEventListener('mousedown', startRecording);
        startButton.addEventListener('mouseup', stopRecording);
        startButton.addEventListener('mouseleave', stopRecording);
        startButton.addEventListener('touchstart', startRecording);
        startButton.addEventListener('touchend', stopRecording);

        function setupAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                freqs = new Uint8Array(analyser.frequencyBinCount);
                setupWebSocket();
                setupRecognition();
                visualize();
            }
        }



        
        
        function setupWebSocket() {
            // ws = new WebSocket('ws://localhost:8000/tm-text-audio/ws_stream_response');

            ws = new WebSocket('wss://a2a.api.centrox.ai/tm-text-audio/ws_stream_response');
            
            ws.onopen = () => {
                console.log('WebSocket connection opened');
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
                setTimeout(setupWebSocket, 3000); // Attempt to reconnect
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            }; 
               ws.onmessage = async (event) => {
                console.log('Message received:', event.data);
                try {
                    if (typeof event.data === 'string') {
                        const message = JSON.parse(event.data);
                        if (message.type === 'audio') {
                            // Add the actual response text to history
                            if (message.text && message.text !== 'Stream-End') {
                                addToHistory(message.text, false);
                            }
                            
                            if (message.audio) {
                                const audioData = Uint8Array.from(atob(message.audio), c => c.charCodeAt(0));
                                const audioBuffer = await audioCtx.decodeAudioData(audioData.buffer);
                                audioQueue.push(audioBuffer);
                                if (!isPlaying) playNextInQueue();
                            }
                        }
                    } else {
                        const arrayBuffer = await event.data.arrayBuffer();
                        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                        audioQueue.push(audioBuffer);
                        if (!isPlaying) playNextInQueue();
                    }
                } catch (error) {
                    console.error('Error processing message:', error);
                }
            };
            ws.onclose = () => console.log('WebSocket closed');
        }

// Improved recognition setup
function setupRecognition() {
    if (recognition) {
        recognition.stop();
        recognition = null;
    }

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    
    recognition.onstart = () => {
        console.log('Recognition started');
        isRecognitionStopped = false;
        // Reset transcripts when starting new recognition
        currentTranscript = '';
        finalTranscript = '';
        recognitionComplete = false;
    };

    recognition.onresult = (event) => {
        currentTranscript = '';
        let interimTranscript = '';
        
        // Process results
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const result = event.results[i];
            if (result.isFinal) {
                finalTranscript += result[0].transcript;
            } else {
                interimTranscript += result[0].transcript;
            }
        }

        // Update current transcript
        currentTranscript = finalTranscript + interimTranscript;
        
        // Update UI
        if (interimTranscript) {
            logElement.innerText = 'Listening: ' + currentTranscript;
        } else {
            logElement.innerText = currentTranscript;
        }
    };

    recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        if (event.error === 'no-speech') {
            logElement.innerText = 'No speech detected. Please try again.';
        }
        recognitionComplete = true;
        stopRecording({ preventDefault: () => {} });
    };

    recognition.onend = () => {
        console.log('Recognition ended');
        isRecognitionStopped = true;
        recognitionComplete = true;

        // Only process if we have a final transcript
        if (finalTranscript.trim()) {
            processRecognitionResult();
        } else {
            logElement.innerText = 'No speech detected. Please try again.';
            isRecording = false;
            startButton.classList.remove('recording');
        }
    };
}
function processRecognitionResult() {
    if (finalTranscript.trim() && recognitionComplete) {
        isProcessing = true;
        addToHistory(finalTranscript.trim(), true);
        logElement.innerText = 'Processing...';
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: "text",
                data: finalTranscript.trim(),
                tts: currentTTS,
                model: currentModel
            }));
        } else {
            console.error('WebSocket not connected');
            logElement.innerText = 'Connection error. Please try again.';
            isProcessing = false;
        }
        
        // Reset transcripts after processing
        finalTranscript = '';
        currentTranscript = '';
    }
}
function startRecording(e) {
    e.preventDefault();
    
    if (isPlaying || isProcessing) {
        logElement.innerText = 'Please wait for the current process to complete';
        return;
    }

    setupAudio();
    
    if (!isRecording) {
        try {
            setupRecognition(); // Reset recognition instance
            recognition.start();
            isRecording = true;
            startButton.classList.add('recording');
            logElement.innerText = 'Listening...';
            transcript = '';
            
            // Set a maximum recording time (e.g., 30 seconds)
            recordingTimeout = setTimeout(() => {
                if (isRecording) {
                    stopRecording({ preventDefault: () => {} });
                }
            }, 30000);
        } catch (err) {
            console.error('Error starting recognition:', err);
            isRecording = false;
            startButton.classList.remove('recording');
            logElement.innerText = 'Error starting recording. Please try again.';
        }
    }
}


// Improved recording stop function
function stopRecording(e) {
    e.preventDefault();
    
    if (recordingTimeout) {
        clearTimeout(recordingTimeout);
        recordingTimeout = null;
    }

    if (isRecording) {
        isRecording = false;
        startButton.classList.remove('recording');
        
        try {
            recognition.stop();
        } catch (err) {
            console.error('Error stopping recognition:', err);
        }

        // Use the last valid transcript if available
        const finalTranscript = lastTranscript || transcript;
        
        if (finalTranscript.trim()) {
            isProcessing = true;
            addToHistory(finalTranscript.trim(), true);
            logElement.innerText = 'Processing...';
            
            // Ensure WebSocket is connected before sending
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: "text",
                    data: finalTranscript.trim(),
                    tts: currentTTS,
                    model: currentModel
                }));
            } else {
                console.error('WebSocket not connected');
                logElement.innerText = 'Connection error. Please try again.';
                isProcessing = false;
            }
        } else {
            logElement.innerText = 'Press and hold to speak';
        }
    }
}

// Improved audio playback function
function playNextInQueue() {
    if (audioQueue.length === 0 || isPlaying) return;
    
    isPlaying = true;
    isProcessing = false; // Reset processing state
    logElement.innerText = 'Playing response...';
    
    try {
        const audioBuffer = audioQueue.shift();
        currentSourceNode = audioCtx.createBufferSource();
        currentSourceNode.buffer = audioBuffer;
        currentSourceNode.connect(analyser);
        currentSourceNode.connect(audioCtx.destination);
        
        currentSourceNode.onended = () => {
            isPlaying = false;
            if (audioQueue.length > 0) {
                setTimeout(() => playNextInQueue(), 100); // Small delay between audio chunks
            } else {
                logElement.innerText = 'Press and hold to speak';
            }
        };
        
        currentSourceNode.start();
    } catch (err) {
        console.error('Error playing audio:', err);
        isPlaying = false;
        logElement.innerText = 'Error playing audio. Please try again.';
    }
}
        // Visualization functions
        function visualize() {
            analyser.smoothingTimeConstant = opts.smoothing;
            analyser.fftSize = Math.pow(2, opts.fft);
            analyser.minDecibels = opts.minDecibels;
            analyser.maxDecibels = 0;
            analyser.getByteFrequencyData(freqs);
            
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
            
            path(0);
            path(1);
            path(2);
            
            requestAnimationFrame(visualize);
        }

        function range(i) {
            return Array.from(Array(i).keys());
        }

        const shuffle = [1, 3, 0, 4, 2];

        function freq(channel, i) {
            const band = 2 + channel + shuffle[i] * 6;
            return freqs[band];
        }

        function scale(i) {
            const x = Math.abs(2 - i);
            const s = 3 - x;
            return s / 3 * opts.amp;
        }

        function path(channel) {
            const color = opts[`color${channel + 1}`].map(Math.floor);
            ctx.fillStyle = `rgba(${color}, ${opts.fillOpacity})`;
            ctx.strokeStyle = ctx.shadowColor = `rgb(${color})`;
            ctx.lineWidth = opts.lineWidth;
            ctx.shadowBlur = opts.glow;
            ctx.globalCompositeOperation = opts.blend;

            const m = HEIGHT / 2;
            const offset = (WIDTH - 15 * opts.width) / 2;
            const x = range(15).map(i => offset + channel * opts.shift + i * opts.width);
            const y = range(5).map(i => Math.max(0, m - scale(i) * freq(channel, i)));
            const h = 2 * m;

            ctx.beginPath();
            ctx.moveTo(0, m);
            ctx.lineTo(x[0], m + 1);
            ctx.bezierCurveTo(x[1], m + 1, x[2], y[0], x[3], y[0]);
            ctx.bezierCurveTo(x[4], y[0], x[4], y[1], x[5], y[1]);
            ctx.bezierCurveTo(x[6], y[1], x[6], y[2], x[7], y[2]);
            ctx.bezierCurveTo(x[8], y[2], x[8], y[3], x[9], y[3]);
            ctx.bezierCurveTo(x[10], y[3], x[10], y[4], x[11], y[4]);
            ctx.bezierCurveTo(x[12], y[4], x[12], m, x[13], m);
            ctx.lineTo(WIDTH, m + 1);
            ctx.lineTo(x[13], m - 1);
            ctx.bezierCurveTo(x[12], m, x[12], h - y[4], x[11], h - y[4]);
            ctx.bezierCurveTo(x[10], h - y[4], x[10], h - y[3], x[9], h - y[3]);
            ctx.bezierCurveTo(x[8], h - y[3], x[8], h - y[2], x[7], h - y[2]);
            ctx.bezierCurveTo(x[6], h - y[2], x[6], h - y[1], x[5], h - y[1]);
            ctx.bezierCurveTo(x[4], h - y[1], x[4], h - y[0], x[3], h - y[0]);
            ctx.bezierCurveTo(x[2], h - y[0], x[1], m, x[0], m);
            ctx.lineTo(0, m);
            ctx.fill();
            ctx.stroke();
        }
    </script>
